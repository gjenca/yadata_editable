# yadata_editable — Apache config snippet
#
# The app is a Flask/WSGI application served as a CGI script via
# wsgiref.handlers.CGIHandler (see main.cgi). deploy.sh installs the code to
# /usr/local/lib/yadata_editable and the entry point is main.cgi.
#
# Prerequisites (run once as root):
#   a2enmod cgid        # or "cgi" on a prefork MPM
#   systemctl reload apache2
#
# Drop this file in /etc/apache2/conf-available/ (or inside a <VirtualHost>)
# and enable it:
#   a2enconf apache-yadata_editable
#   systemctl reload apache2
#
# The app is then reachable under the /yadata_editable URL prefix, e.g.
#   https://your.host/yadata_editable/test_login
# Change the ScriptAlias URL below to mount it elsewhere (Flask's url_for()
# honours SCRIPT_NAME, so internal links follow automatically).

# Map the URL prefix directly onto the CGI entry point. Everything after the
# prefix becomes PATH_INFO, which Flask uses for routing. ScriptAlias also
# marks the target as a CGI script, so only main.cgi is executed/exposed —
# main.py and the rest of the tree are never served as plain files.
ScriptAlias /yadata_editable /usr/local/lib/yadata_editable/main.cgi

<Directory /usr/local/lib/yadata_editable>
    Options +ExecCGI
    AddHandler cgi-script .cgi
    Require all granted

    # main.cgi runs with this directory as its working directory, so the
    # app's open('creds.txt') resolves here. Make sure creds.txt is present
    # (deploy.sh does not currently copy it) and readable by www-data.
</Directory>
